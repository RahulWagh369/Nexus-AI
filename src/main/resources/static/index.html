<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Root Variables for easy switching */
        :root {
            --bg-gradient: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --text-color: #00d2ff;
            --msg-ai: rgba(255, 255, 255, 0.1);
            --msg-text: #e0e0e0;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00d2ff;
        }

        /* Light Theme Overrides */
        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --text-color: #2c3e50;
            --msg-ai: rgba(0, 0, 0, 0.05);
            --msg-text: #2c3e50;
            --border: rgba(255, 255, 255, 0.6);
            --accent: #3a7bd5;
        }

        body { 
            background: var(--bg-gradient);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; transition: all 0.5s ease;
        }

        /* Glass Container */
        #chat-container { 
            width: 600px; background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2); padding: 25px; display: flex; flex-direction: column;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: absolute; top: 20px; right: 20px;
            background: var(--accent); color: white; border: none;
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold;
        }

        h3 { text-align: center; margin-top: 0; letter-spacing: 2px; color: var(--text-color); }

        #chat-window { 
            height: 400px; overflow-y: auto; padding: 15px; margin-bottom: 20px; 
            border-radius: 12px; background: rgba(0, 0, 0, 0.05); scrollbar-width: thin;
        }

        .message { margin-bottom: 20px; padding: 12px 18px; border-radius: 18px; max-width: 85%; transition: all 0.3s; }
        .user-msg { background: linear-gradient(135deg, #3a7bd5 0%, #00d2ff 100%); color: white; margin-left: auto; }
        .ai-msg { background: var(--msg-ai); color: var(--msg-text); margin-right: auto; border: 1px solid var(--border); }

        .input-area { display: flex; gap: 12px; background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 30px; border: 1px solid var(--border); }
        #user-input { flex-grow: 1; background: transparent; border: none; color: var(--msg-text); padding: 5px 15px; outline: none; }
        
        button#send-btn { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 20px; cursor: pointer; }

        .custom-footer { margin-top: 25px; text-align: center; color: var(--text-color); font-size: 14px; opacity: 0.8; }
        .heart { color: #ff3b30; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">Switch Theme</button>

<div id="chat-container">
    <h3>Nexus AI</h3>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<div class="custom-footer">
    Made with <span class="heart">❤️</span> by Rahul Wagh<br>
    &copy; 2026 Rahul Wagh
</div>

<script>
    const chatWindow = document.getElementById('chat-window');

    // Theme Toggle Logic
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    }

    // Load Theme & History on startup
    window.onload = () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        const history = JSON.parse(localStorage.getItem('nexus_history')) || [];
        if (history.length === 0) {
            addMessage("ai", "System online. How can I help you, Rahul?");
        } else {
            history.forEach(msg => addMessage(msg.role, msg.text, false));
        }
    };

    function addMessage(role, text, save = true) {
        const div = document.createElement('div');
        div.className = `message ${role}-msg`;
        div.innerHTML = role === 'ai' ? marked.parse(text) : text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        if (save) {
            const history = JSON.parse(localStorage.getItem('nexus_history')) || [];
            history.push({ role, text });
            localStorage.setItem('nexus_history', JSON.stringify(history));
        }
    }

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const message = inputField.value.trim();
        if (!message) return;

        addMessage("user", message);
        inputField.value = ''; 

        const typingId = "typing-" + Date.now();
        const typingDiv = document.createElement('div');
        typingDiv.id = typingId;
        typingDiv.className = "message ai-msg";
        typingDiv.innerHTML = "<em>Neural processing...</em>";
        chatWindow.appendChild(typingDiv);

      try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: message })
            });
            
            // 1. Convert the raw string response into a JSON object
            const rawData = await response.json();
            
            // 2. Extract ONLY the text content from the deep JSON structure
            const cleanAiText = rawData.choices[0].message.content;

            // 3. Remove the "Processing" indicator and display the clean text
            document.getElementById(typingId).remove();
            addMessage("ai", cleanAiText);
            
        } catch (error) {
            console.error("Error details:", error);
            document.getElementById(typingId).innerHTML = "Neural Link Error.";
        }
    }
</script>
</body>
</html>
